name: release

on:
  push:
    tags: ['v*.*.*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract tag without 'v'
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch
        env:
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo -n "$GH_USER" > /tmp/ghuser
          echo -n "$GH_TOKEN" > /tmp/ghpat
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --secret id=ghuser,src=/tmp/ghuser \
            --secret id=ghpat,src=/tmp/ghpat \
            --push \
            -t gymassistant/mcp-server:${{ steps.tag.outputs.version }} \
            -t gymassistant/mcp-server:latest \
            .
          rm /tmp/ghuser /tmp/ghpat

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
