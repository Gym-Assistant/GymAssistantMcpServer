name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Add credentials to `gym` source
        run: |
          dotnet nuget update source gym \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker build (no push)
        env:
          GH_USER: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo -n "$GH_USER" > /tmp/ghuser
          echo -n "$GH_TOKEN" > /tmp/ghpat
          docker buildx build \
            --secret id=ghuser,src=/tmp/ghuser \
            --secret id=ghpat,src=/tmp/ghpat \
            --load \
            -t gymassistant/mcp-server:ci .
          rm /tmp/ghuser /tmp/ghpat
